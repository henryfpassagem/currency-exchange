<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Currency exchange</title>
</head>
<body>
    <div class="container">
        <header>
            <h1>Currency Exchange</h1>
        </header>

        <form>
            <label>
                Type the currency:
                <input type="text" name="currency" class="input-currency">
            </label>
            <button class="btn-search">Search</button>
        </form>

        <main class="currencies-container">
            <h2 class="currencies-title"></h2>
            <ul class="currencies-list"></ul>
        </main>
    </div>

    <script type="module" src="./src/main.js"></script>
</body>
</html>
